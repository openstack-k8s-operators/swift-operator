apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - swift_v1beta1_swift.yaml

patches:
  - target:
      kind: Swift
      name: swift
    patch: |-
      - op: replace
        path: /spec/swiftProxy/replicas
        value: 1
      - op: replace
        path: /spec/swiftStorage/replicas
        value: 1
      - op: replace
        path: /spec/swiftRing/enabled
        value: false
      - op: add
        path: /spec/ringConfigMaps
        value:
          - swift-ring-files
